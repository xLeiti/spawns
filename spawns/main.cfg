alias loadSpawnsVertigo "echo "loading Vertigo";  exec spawns/maps/de_vertigo.cfg"
alias loadSpawnsStronghold "echo "loading Stronghold";  exec spawns/maps/de_stronghold.cfg"
alias loadSpawnsOffice "echo "loading Office";  exec spawns/maps/cs_office.cfg"
alias loadSpawnsAlpine "echo "loading Alpine";  exec spawns/maps/cs_alpine.cfg"
