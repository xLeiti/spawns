//####################################################################################################
//##================================❗❗❗ ＫＥＹＢＩＮＤ ❗❗❗==================================##
//####################################################################################################

//toggle bind to enable/disable the spawn balloons
bind f3 toggleSpawns;

//####################################################################################################
//##===================================⚠️⚠️⚠️ ＬＯＧＩＣ ⚠️⚠️⚠️===================================##
//##⛔⛔⛔ ＤＯ ＮＯＴ ＴＯＵＣＨ ＩＦ ＹＯＵ ＤＯＮ'Ｔ ＫＮＯＷ ＷＨＡＴ ＹＯＵ ＡＲＥ ＤＯＩＮＧ⛔⛔⛔##
//####################################################################################################

alias toggleSpawns "toggleSpawnsOn"
alias toggleSpawnsOn "prepareExecution;curMap; alias toggleSpawns toggleSpawnsOff"
alias toggleSpawnsOff "unloadSpawns; alias toggleSpawns toggleSpawnsOn"

alias unloadSpawns "exec_async spawns/unloadSpawns.cfg"
alias prepareExecution "exec spawns/prepareExecution.cfg"
alias curMap "ent_create point_script {targetname curmap cs_script cfg/spawns/curmap.vjs}"
alias loadUnsupportedMap "prepareExecution;ent_create point_script {targetname curmap cs_script cfg/spawns/unknown.vjs}";

// premier maps
alias map_de_mirage "echo "loading Mirage";  exec spawns/maps/de_mirage.cfg; alias loadUnsupported;"
