ent_create env_hudhint {"message" "Spawn" "targetname" "#spawns_spawn"};
ent_create env_hudhint {"message" "Unknown Map" "targetname" "#spawns_unknown"};

exec spawns/addon/unsupported1
exec spawns/addon/unsupported2
exec spawns/addon/unsupported3
exec spawns/addon/unsupported4

ent_fire info_player_* FireUser4

sleep 200

ent_fire #spawns_unknown showhudhint;
exec spawns/addon/unsupported5
exec spawns/addon/unsupported6
exec spawns/addon/unsupported7

sleep 50
ent_fire #spawns_16* SetLocalOrigin "0 0 -105"
sleep 50
ent_fire #spawns_16* color "0 0 255"
ent_fire #spawns_16* ClearParent 
ent_fire #spawns_16* SetSolid 6
ent_fire #spawns_16* AddOutput "OnUser4>!self>SetHealth>1>0>-1"
ent_fire #spawns_16* AddOutput "OnUser4>!self>SetDamageFilter>bullet_and_knife>0>-1"
ent_fire #spawns_16* FireUser4
ent_fire #spawns_16* enable
ent_fire #spawns_16* AddOutput "OnTakeDamage>!self>Open>>0>-1" 
ent_fire #spawns_16* AddOutput "OnOpen>#spawns_spawn>ShowHudHint>>0>-1" 
ent_fire #spawns_16* AddOutput "OnOpen>!activator>SetLocalOrigin>0 0 105>0.01>-1" 
ent_fire #spawns_16* AddOutput "OnOpen>!activator>ClearParent>>0.02>-1" 
ent_fire #spawns_16* AddOutput "OnOpen>!self>Close>>0>-1" 